# Application configuration for pp_assistant
# Use namespaces to separate concerns and keep YAML easy to extend.

datasets:
  base_path: pp_assistant/data/datasets

objects:
  - red_block:
    width: 2.7
    height: 5.4

camera:
  preview_size: [640, 480]
  interleaved: false
  stream_name: rgb
  intrinsics:
    - [500.38571167, 0.0, 314.06344604]
    - [0.0, 500.47668457, 238.7240448]
    - [0.0, 0.0, 1.0]
  distortion_coeffs: [-4.14610481e+00, 1.10561991e+01, -3.34565295e-04, -5.48989163e-04, -7.81179380e+00, -4.22761488e+00, 1.13181620e+01, -8.09042549e+00, 0.0, 0.0, 0.0, 0.0, -7.13373360e-04, -1.07512390e-03]

ui:
  window_name: image
  points_required: 4

calibration:
  world_points:
    - [0.0, 0.0]
    - [45.9, 0.0]
    - [45.9, 22.0]
    - [0.0, 22.0]
  target_world_point: [5.8, 10.0]

marker:
  color: [0, 0, 255]
  radius: 5
  thickness: -1

drawing:
  workspace_color: [255, 0, 0]
  workspace_thickness: 2
  cell_label:
    font_scale: 0.5
    font_thickness: 1
    bg_padding: 5
    show_label: true
